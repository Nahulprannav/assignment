apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  JWT_EXPIRES_IN: "7d"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: ai-task-platform
type: Opaque
stringData:
  JWT_SECRET: "${JWT_SECRET}"
  MONGODB_URI: "mongodb://mongodb-service:27017/ai-task-platform"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ai-task-platform
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-task-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: ${DOCKER_HUB_USERNAME}/ai-task-backend:${IMAGE_TAG}
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
